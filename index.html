<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio Contable - Datos de Contacto</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f4f8;
            color: #1e293b;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            padding: 35px 25px;
            box-shadow: 0 10px 25px rgba(30, 41, 59, 0.05);
            text-align: center;
        }
        .header-logo {
            width: 70px;
            height: 70px;
            background: #1e3a8a;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px auto;
            font-size: 28px;
            font-weight: bold;
        }
        h1 {
            font-size: 24px;
            color: #0f172a;
            margin-bottom: 8px;
            font-weight: 700;
        }
        .subtitle {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 30px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 15px;
            margin-bottom: 12px;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn-whatsapp {
            background-color: #25D366;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2);
        }
        .btn-email {
            background-color: #0284c7;
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.2);
        }
        .btn-maps {
            background-color: #ef4444;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
        }
        .btn-descargas {
            background-color: #1e3a8a;
            box-shadow: 0 4px 12px rgba(30, 58, 138, 0.2);
        }
        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="card">
    <!-- Icono representativo (Podés cambiar la letra por la inicial de tu estudio) -->
    <div class="header-logo">E</div>
    
    <!-- Nombre de tu estudio -->
    <h1>Estudio Contable</h1>
    <p class="subtitle">Tarjeta de contacto y descargas oficiales</p>

    <!-- 1. ENLACE A WHATSAPP -->
    <!-- Reemplaza 549XXXXXXXXXX por tu número real (Código de país + código de área + número sin el 15) -->
    <!-- Ejemplo para Argentina: 5491123456789 -->
    <a href="https://wa.me/549XXXXXXXXXX?text=Hola!%20Me%20contacto%20desde%20la%20tarjeta%20digital." class="btn btn-whatsapp" target="_blank">
        💬 WhatsApp Comercial
    </a>

    <!-- 2. ENLACE AL CORREO -->
    <!-- Reemplaza correo@estudio.com por tu dirección de email real -->
    <a href="mailto:correo@estudio.com?subject=Consulta%20Estudio%20Contable" class="btn btn-email">
        📧 Enviar Correo Electrónico
    </a>

    <!-- 3. ENLACE A GOOGLE MAPS -->
    <!-- Reemplaza el texto después de '?q=' por la dirección de tu estudio o el nombre si figura en Google Maps -->
    <!-- Ejemplo: ?q=Calle+Falsa+123+Buenos+Aires -->
    <a href="https://maps.google.com/?q=Av+Sarmiento+1201+Obera+Misiones" class="btn btn-maps" target="_blank">
        📍 Ubicación en Google Maps
    </a>

    <!-- 4. ENLACE DE DESCARGAS (Drive, Dropbox, etc.) -->
    <!-- Reemplaza el link completo por la URL de la carpeta en la nube que les compartís -->
    <a href="https://spowerinfo.com.ar/estudio2.apk" class="btn btn-descargas" target="_blank">
        📂 Archivos de Descarga
    </a>

    <div class="footer">
        © 2026 Estudio Contable. Todos los derechos reservados.
    </div>
</div>

</body>
</html>
