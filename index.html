<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zajarchuk Estudio Contable</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f8;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #ffffff;
            width: 100%;
            max-width: 420px;
            border-radius: 24px;
            padding: 30px 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            text-align: center;
        }
        .logo-container {
            width: 100%;
            max-width: 280px;
            margin: 0 auto 15px auto;
        }
        .logo-img {
            width: 100%;
            height: auto;
            object-fit: contain;
        }
        h1 {
            font-size: 22px;
            color: #1a1a1a;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .subtitle {
            font-size: 13px;
            color: #7f8c8d;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        /* Bloque de Información de solo lectura */
        .info-box {
            background-color: #f8f9fa;
            border-left: 5px solid #134e4a; /* Verde oscuro basado en el logo */
            border-radius: 12px;
            padding: 20px;
            text-align: left;
            margin-bottom: 25px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }
        .info-item {
            margin-bottom: 15px;
        }
        .info-item:last-child {
            margin-bottom: 0;
        }
        .info-label {
            font-size: 11px;
            font-weight: 700;
            color: #134e4a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
        }
        .info-value {
            font-size: 15px;
            color: #2c3e50;
            font-weight: 500;
        }
        /* Botones de acción */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 15px;
            margin-bottom: 12px;
            color: white;
            text-decoration: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.2s, transform 0.1s;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn-maps {
            background-color: #2e7d32; /* Verde intermedio para mapas */
        }
        .btn-maps:hover {
            background-color: #1b5e20;
        }
        .btn-descargas {
            background-color: #111827; /* Negro/Gris oscuro institucional */
        }
        .btn-descargas:hover {
            background-color: #1f2937;
        }
        .footer {
            margin-top: 25px;
            font-size: 11px;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-container">
        <img src="logo.bmp" alt="Zajarchuk Estudio Contable" class="logo-img">
    </div>
    
    
    <p class="subtitle">Estudio Contable Zajarchuk</p>

    <div class="info-box">
        <div class="info-item">
            <div class="info-label">Telefono</div>
            <div class="info-value">3755-432994</div> </div>
        <div class="info-item">
            <div class="info-label">Correo Electrónico</div>
            <div class="info-value">estudiozaj@yahoo.com.ar</div> </div>
        <div class="info-item">
            <div class="info-label">Dirección</div>
            <div class="info-value">Av. Sarmiento y Av. Tucuman 1201</div> </div>
    </div>

    <!-- BOTONES DE ACCIÓN (INTERACTIVOS) -->
    <!-- Reemplaza el texto de ?q= por tu dirección para Google Maps -->
    <a href="https://maps.google.com/?q=Av. Sarmiento 1201, N3360 Oberá, Misiones" class="btn btn-maps" target="_blank">
    📍 Ubicación en Google Maps
   </a>

    <a href="https://spowerinfo.com.ar/estudio2.apk" class="btn btn-descargas" target="_blank">
        📂 Archivos de Descarga
    </a>

    <div class="footer">
        © 2026 Zajarchuk Estudio Contable. Todos los derechos reservados.
    </div>
</div>

</body>
</html>
